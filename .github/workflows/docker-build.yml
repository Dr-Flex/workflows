name: Docker build

on:
  workflow_call:
    inputs:
      build-context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      dockerfile:
        description: "Optional Dockerfile path. If empty, Docker uses the default Dockerfile in the build context."
        required: false
        type: string
        default: ""
      integration-test-folder:
        description: "docker compose file for integration tests"
        required: false
        type: string
      build-args:
        description: "Additional --build-arg values, one KEY=VALUE per line"
        required: false
        type: string
        default: ""

jobs:
  docker-build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Create image ref
        run: |
          export IMAGE_TAG="$(date +'%Y-%m-%d_%H-%M-%S')_${{ github.ref_name }}_${{ github.sha }}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          
      - name: Build the Docker image
        env:
          BUILD_CONTEXT: ${{ inputs.build-context }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          EXTRA_BUILD_ARGS: ${{ inputs.build-args }}
        run: |
          docker_args=(
            --build-arg="IMAGE_TAG=$IMAGE_TAG"
            -t "${{ secrets.DOCKER_REGISTRY_URL }}/dr-flex/${{ github.event.repository.name }}:$IMAGE_TAG"
          )
          if [ -n "$DOCKERFILE" ]; then
            docker_args+=(-f "$DOCKERFILE")
          fi
          while IFS= read -r build_arg_line; do
            [ -n "$build_arg_line" ] && docker_args+=(--build-arg="$build_arg_line")
          done <<< "$EXTRA_BUILD_ARGS"
          docker build "${docker_args[@]}" "$BUILD_CONTEXT"
        
      - name: Run integration tests
        if: "${{ inputs.integration-test-folder != '' }}"
        run: cd "${{ inputs.integration-test-folder}}" && docker compose up --force-recreate -V --build --exit-code-from test-runner
